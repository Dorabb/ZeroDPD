version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:13-alpine
    container_name: zerodpd-postgres
    environment:
      POSTGRES_DB: zerodpd
      POSTGRES_USER: zerodpd_user
      POSTGRES_PASSWORD: secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data-platform/schemas/postgresql:/docker-entrypoint-initdb.d
    networks:
      - zerodpd_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerodpd_user -d zerodpd"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:5.0
    container_name: zerodpd-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: zerodpd_user
      MONGO_INITDB_ROOT_PASSWORD: secure_password
      MONGO_INITDB_DATABASE: zerodpd
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - zerodpd_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zerodpd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zerodpd_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.0
    container_name: zerodpd-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - zerodpd_network

  kafka:
    image: confluentinc/cp-kafka:7.0.0
    container_name: zerodpd-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - zerodpd_network
    healthcheck:
      test: kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: zerodpd-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ZeroDPD
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - zerodpd_network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.14.0
    container_name: zerodpd-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - zerodpd_network
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway (Placeholder - will be built)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: zerodpd-api-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: zerodpd
      POSTGRES_USER: zerodpd_user
      POSTGRES_PASSWORD: secure_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      API_PORT: 8080
      LOG_LEVEL: INFO
    networks:
      - zerodpd_network
    restart: unless-stopped

  # Collections Service (Placeholder - will be built)
  collections-service:
    build:
      context: ./core-services/collections-service
      dockerfile: Dockerfile
    container_name: zerodpd-collections-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: zerodpd
      POSTGRES_USER: zerodpd_user
      POSTGRES_PASSWORD: secure_password
      KAFKA_BROKERS: kafka:29092
      SERVICE_PORT: 8081
      LOG_LEVEL: INFO
    networks:
      - zerodpd_network
    restart: unless-stopped

  # Communication Service (Placeholder - will be built)
  communication-service:
    build:
      context: ./core-services/communication-service
      dockerfile: Dockerfile
    container_name: zerodpd-communication-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: mongodb://zerodpd_user:secure_password@mongodb:27017/zerodpd
      KAFKA_BROKERS: kafka:29092
      SERVICE_PORT: 8082
      LOG_LEVEL: INFO
    networks:
      - zerodpd_network
    restart: unless-stopped

  # Agent Workbench Frontend (Placeholder - will be built)
  agent-workbench:
    build:
      context: ./agent-workbench/frontend
      dockerfile: Dockerfile
    container_name: zerodpd-agent-workbench
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/v1
    networks:
      - zerodpd_network
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:

networks:
  zerodpd_network:
    driver: bridge
