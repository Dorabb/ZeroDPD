spring.application.name=zerodpd-api-gateway
server.port=${API_PORT:8080}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:zerodpd}
spring.datasource.username=${POSTGRES_USER:zerodpd_user}
spring.datasource.password=${POSTGRES_PASSWORD:secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=zerodpd-api-gateway
spring.kafka.consumer.auto-offset-reset=earliest

# OAuth2 / Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:https://auth.zerodpd.com}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_JWK_SET_URI:https://auth.zerodpd.com/.well-known/jwks.json}

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.dorabb.zerodpd=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/api-gateway.log

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Application Custom Properties
app.name=ZeroDPD API Gateway
app.version=1.0.0
app.description=API Gateway for ZeroDPD Loan Recovery Platform

# Rate Limiting
app.rate-limit.requests=${RATE_LIMIT_REQUESTS:1000}
app.rate-limit.window-minutes=${RATE_LIMIT_WINDOW:1}
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}

# Audit Logging
app.audit.enabled=true
app.audit.log-sensitive-data=false
